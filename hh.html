<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج الامتحانات | وزارة التربية والتعليم</title>
    <style>
        :root {
            --primary-color: #8c6d31; 
            --secondary-color: #1a252f; 
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#dfd4bf 0.5px, transparent 0.5px), radial-gradient(#dfd4bf 0.5px, #f8f9fa 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            border-top: 8px solid var(--primary-color);
            text-align: center;
            width: 100%;
            max-width: 450px;
            transition: all 0.3s ease;
        }

        /* تنسيق الشعار المدمج SVG */
        .logo-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 15px auto;
        }

        h1 {
            color: var(--secondary-color);
            font-size: 22px;
            margin: 5px 0;
            font-weight: 700;
        }

        h2 {
            color: var(--primary-color);
            font-size: 16px;
            margin: 0 0 25px 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
            transition: all 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 8px rgba(140, 109, 49, 0.2);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--secondary-color), #2c3e50);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(26, 37, 47, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(26, 37, 47, 0.3);
        }

        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.5s ease;
            border-right: 6px solid;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 15px;
            color: #666;
            margin-bottom: 5px;
        }

        .result-val {
            font-size: 26px;
            font-weight: 800;
            margin: 5px 0;
        }

        .excellent { background-color: #edf7ed; color: #1e4620; border-color: #4caf50; }
        .very-good { background-color: #e8f4fd; color: #0d3c61; border-color: #2196f3; }
        .good { background-color: #fff9e6; color: #664d03; border-color: #ffc107; }
        .acceptable { background-color: #f4f5f7; color: #3a3b3c; border-color: #9e9e9e; }
        .failed { background-color: #fdf2f2; color: #610d0d; border-color: #f44336; }

        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: #aaaeaf;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="logo-container">
        <svg viewBox="0 0 200 200" width="100%" height="100%">
            <circle cx="100" cy="100" r="90" fill="none" stroke="#8c6d31" stroke-width="3"/>
            <circle cx="100" cy="100" r="84" fill="none" stroke="#8c6d31" stroke-width="1.5"/>
            <circle cx="100" cy="100" r="76" fill="none" stroke="#8c6d31" stroke-width="2" stroke-dasharray="6 3"/>
            <circle cx="100" cy="100" r="54" fill="none" stroke="#8c6d31" stroke-width="2"/>
            
            <path d="M 115 75 A 28 28 0 1 0 115 125 A 23 23 0 1 1 115 75 Z" fill="#8c6d31" />
            <polygon points="122,95 125,103 133,103 127,108 129,116 122,111 115,116 117,108 111,103 119,103" fill="#8c6d31"/>
            
            <path id="textPathTop" d="M 35 100 A 65 65 0 0 1 165 100" fill="none" />
            <path id="textPathBottom" d="M 165 100 A 65 65 0 0 1 35 100" fill="none" />
            
            <text font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8c6d31" text-anchor="middle">
                <textPath href="#textPathTop" startOffset="50%">حكومة الوحدة الوطنية</textPath>
            </text>
            <text font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8c6d31" text-anchor="middle">
                <textPath href="#textPathBottom" startOffset="50%">وزارة التربية والتعليم</textPath>
            </text>
            
            <polygon points="42,100 46,96 50,100 46,104" fill="#8c6d31"/>
            <polygon points="150,100 154,96 158,100 154,104" fill="#8c6d31"/>
        </svg>
    </div>
    
    <h1>حكومة الوحدة الوطنية</h1>
    <h2>وزارة التربية والتعليم - منظومة الامتحانات</h2>
    
    <div class="form-group">
        <label for="seatNumber">رقم جلوس الطالب / القيد:</label>
        <input type="number" id="seatNumber" placeholder="أدخل رقم الجلوس..." required>
    </div>
    
    <button onclick="processResult()">استعلام عن النتيجة</button>

    <div id="loader" class="loader"></div>

    <div id="result" class="result-box">
        <div class="result-title" id="resSeat"></div>
        <div class="result-title">النتيجة والتقدير العام:</div>
        <div id="resPercentage" class="result-val"></div>
        <div id="resGrade" style="font-size: 18px; font-weight: bold; margin-top: 5px;"></div>
    </div>

    <div class="footer-text">جميع الحقوق محفوظة © وزارة التربية والتعليم</div>
</div>

<script>
function processResult() {
    const seatNumberStr = document.getElementById('seatNumber').value;
    const loader = document.getElementById('loader');
    const resultBox = document.getElementById('result');
    
    if (!seatNumberStr) {
        alert('فضلاً، يرجى إدخال رقم جلوس صحيح للبحث.');
        return;
    }

    resultBox.style.display = "none";
    loader.style.display = "block";

    setTimeout(() => {
        loader.style.display = "none";
        
        let hash = 0;
        for (let i = 0; i < seatNumberStr.length; i++) {
            hash = seatNumberStr.charCodeAt(i) + ((hash << 5) - hash);
        }
        
        const minGrade = 48;
        const maxGrade = 100;
        const percentage = minGrade + Math.abs(hash) % (maxGrade - minGrade + 1);
        
        let grade = "";
        let className = "";

        if (percentage >= 85) {
            grade = "ممتاز (ناجح)";
            className = "excellent";
        } else if (percentage >= 75) {
            grade = "جيد جداً (ناجح)";
            className = "very-good";
        } else if (percentage >= 65) {
            grade = "جيد (ناجح)";
            className = "good";
        } else if (percentage >= 50) {
            grade = "مقبول (ناجح)";
            className = "acceptable";
        } else {
            grade = "راسب (له دور ثانٍ)";
            className = "failed";
        }

        document.getElementById('resSeat').innerHTML = `رقم الجلوس المستعلم عنه: <b>${seatNumberStr}</b>`;
        document.getElementById('resPercentage').innerText = `${percentage}%`;
        document.getElementById('resGrade').innerText = grade;
        
        resultBox.className = "result-box " + className;
        resultBox.style.display = "block";
    }, 1200);
}
</script>

</body>
</html>
